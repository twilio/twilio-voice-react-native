name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to release (e.g. 2.0.0 or 2.0.0-rc1)"
        required: true
      development_version:
        description: "Optional: next dev version to continue on (e.g. 2.0.1-dev). Leave blank to skip."
        required: false

# No default permissions; each job below declares exactly what it needs.
permissions: {}

env:
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}

jobs:
  # id-token: write isn't audience-scoped - a job holding it can request an
  # OIDC token for any audience, not just Artifactory's. Isolated here so no
  # dependency-installing job ever holds this permission.
  artifactory-auth:
    runs-on: ubuntu-x64
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@<SHA-CHECKSUM> # TODO: pin

      - name: Artifactory OIDC Auth
        uses: ./.github/actions/artifactory-oidc
        with:
          artifactory_url: ${{ vars.ARTIFACTORY_URL }}

      # Copied to a plain filename since upload-artifact needs an unambiguous path.
      - name: Stage .npmrc for hand-off to build
        run: cp ~/.npmrc ./artifactory.npmrc

      - name: Upload .npmrc
        uses: actions/upload-artifact@<SHA-CHECKSUM> # TODO: pin
        with:
          name: artifactory-npmrc
          path: artifactory.npmrc
          retention-days: 1 # short-lived credential - no reason to keep the artifact around

  # Runs the version bump and build. No write access and no id-token access,
  # so a compromised dependency's postinstall script has nothing to steal or
  # mint during `yarn install`.
  build:
    needs: artifactory-auth
    runs-on: ubuntu-x64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@<SHA-CHECKSUM> # TODO: pin

      - name: Download Artifactory .npmrc
        uses: actions/download-artifact@<SHA-CHECKSUM> # TODO: pin
        with:
          name: artifactory-npmrc

      - name: Restore .npmrc
        run: mv artifactory.npmrc ~/.npmrc

      - run: corepack enable

      - uses: actions/setup-node@<SHA-CHECKSUM> # TODO: pin
        with:
          node-version: "22.13"
          cache: yarn

      - run: yarn install --immutable

      - name: Bump package.json version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: npm version --no-git-tag-version "${RELEASE_VERSION}"

      - name: Stamp constants files
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: node ./scripts/substitute-constants-version.js "${RELEASE_VERSION}"

      - name: Build SDK artifacts
        run: yarn run build:docs

      - name: Upload release tree
        uses: actions/upload-artifact@<SHA-CHECKSUM> # TODO: pin
        with:
          name: release-tree
          path: |
            package.json
            constants/constants.src
            docs/api/
            lib/
            src/constants.ts
            ios/TwilioVoiceReactNativeConstants.h
            android/src/main/java/com/twiliovoicereactnative/CommonConstants.java

  # Never runs dependency code - just git commands. Pushes a new branch
  # (not `main`) for a human to open the PR manually.
  create-release-branch:
    needs: build
    runs-on: ubuntu-x64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@<SHA-CHECKSUM> # TODO: pin

      - uses: actions/download-artifact@<SHA-CHECKSUM> # TODO: pin
        with:
          name: release-tree

      - name: Configure git identity
        run: |
          git config user.name "twilio-vblocks-ci"
          git config user.email "svc.vblocks-ci@twilio.com"

      # Only needed for the development-version continuation step below,
      # which runs npm/node. Skipped when there's no continuation to build.
      - name: Set up Node
        if: inputs.development_version != ''
        uses: actions/setup-node@<SHA-CHECKSUM> # TODO: pin
        with:
          node-version: "22.13"

      - name: Commit release bump
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          git checkout -b "release/${RELEASE_VERSION}"
          git add package.json
          git add constants/constants.src
          git add -f docs/api
          git add -f lib
          git add -f src/constants.ts
          git add -f ios/TwilioVoiceReactNativeConstants.h
          git add -f android/src/main/java/com/twiliovoicereactnative/CommonConstants.java
          git commit --no-verify -m "chore: prepare release ${RELEASE_VERSION}"
          echo "RELEASE_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      # Committed as a second commit on the same branch rather than a
      # separate PR. Merging must use "Create a merge commit" - squash or
      # rebase would fold this into the release commit, and the GitHub
      # Release needs to target the release commit specifically, not the
      # branch tip.
      - name: Commit development-version continuation
        if: inputs.development_version != ''
        env:
          DEVELOPMENT_VERSION: ${{ inputs.development_version }}
        run: |
          npm version --no-git-tag-version "${DEVELOPMENT_VERSION}"
          node ./scripts/substitute-constants-version.js "${DEVELOPMENT_VERSION}"
          git rm -r --ignore-unmatch \
            docs/api \
            lib \
            src/constants.ts \
            ios/TwilioVoiceReactNativeConstants.h \
            android/src/main/java/com/twiliovoicereactnative/CommonConstants.java
          git add -A
          git commit --no-verify -m "chore: continue development on ${DEVELOPMENT_VERSION}"

      - name: Push release branch
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: git push origin "release/${RELEASE_VERSION}"

      # Disabled org-wide for GitHub Actions bots. A human opens the PR
      # manually from this branch to main instead. Kept here, commented out,
      # in case that permission is ever granted.
      # - name: Open pull request
      #   env:
      #     GH_TOKEN: ${{ github.token }}
      #     RELEASE_VERSION: ${{ inputs.release_version }}
      #   run: |
      #     gh pr create \
      #       --title "Release ${RELEASE_VERSION}" \
      #       --body "Automated release preparation for ${RELEASE_VERSION}.
      #
      #     **Merge via \"Create a merge commit\"** - do not squash or rebase.
      #
      #     When drafting the GitHub Release afterward, target this commit specifically:
      #     \`${RELEASE_COMMIT_SHA}\`
      #
      #     (Not \`main\`'s tip, if a development-version continuation commit is also in this PR - that commit lands on top of this one and \`main\`'s tip would reflect the dev-continuation state, not this release.)" \
      #       --base main \
      #       --head "release/${RELEASE_VERSION}"
