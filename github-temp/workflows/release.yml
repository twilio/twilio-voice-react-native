name: Release

# Fired by a human publishing a GitHub Release (see prepare-release.yml) -
# the Release's tag is what gets tested and published here, targeting a
# commit that has already been through a reviewed, merged PR.
on:
  release:
    types: [published]

env:
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}

jobs:
  # id-token: write isn't audience-scoped - a job holding it can request an
  # OIDC token for any audience, not just Artifactory's. Isolated here so no
  # dependency-installing job ever holds this permission.
  artifactory-auth:
    runs-on: ubuntu-x64
    if: github.repository_owner == 'twilio'
    permissions:
      contents: read # only so the local ./.github/actions/artifactory-oidc action file is present to run
      id-token: write
    steps:
      - uses: actions/checkout@<SHA-CHECKSUM> # TODO: pin

      - name: Artifactory OIDC Auth
        uses: ./.github/actions/artifactory-oidc
        with:
          artifactory_url: ${{ vars.ARTIFACTORY_URL }}

      # Copied to a plain filename since upload-artifact needs an unambiguous path.
      - name: Stage .npmrc for hand-off to test
        run: cp ~/.npmrc ./artifactory.npmrc

      - name: Upload .npmrc
        uses: actions/upload-artifact@<SHA-CHECKSUM> # TODO: pin
        with:
          name: artifactory-npmrc
          path: artifactory.npmrc
          retention-days: 1 # short-lived credential - no reason to keep the artifact around

  test:
    needs: artifactory-auth
    runs-on: ubuntu-x64
    if: github.repository_owner == 'twilio' && needs.artifactory-auth.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@<SHA-CHECKSUM> # TODO: pin

      - name: Download Artifactory .npmrc
        uses: actions/download-artifact@<SHA-CHECKSUM> # TODO: pin
        with:
          name: artifactory-npmrc

      - name: Restore .npmrc
        run: mv artifactory.npmrc ~/.npmrc

      - run: corepack enable

      - uses: actions/setup-node@<SHA-CHECKSUM> # TODO: pin
        with:
          node-version: "22.13"
          cache: yarn

      - run: yarn install --immutable

      - run: yarn run check

  deploy:
    name: Publish to npm
    needs: [test]
    runs-on: ubuntu-x64
    if: github.repository_owner == 'twilio' && needs.test.result == 'success'
    environment: production # manual-approval gate + scoped to publish
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing
    outputs:
      version: ${{ steps.dist-tag.outputs.version }}
      release_tag: ${{ steps.dist-tag.outputs.release_tag }}
    steps:
      - uses: actions/checkout@<SHA-CHECKSUM> # TODO: pin

      # This job holds npm-publish OIDC, so dependency code is never allowed
      # to run here - no install or build step. The tagged commit already
      # has everything built.
      - uses: actions/setup-node@<SHA-CHECKSUM> # TODO: pin
        with:
          node-version: 24 # npm >= 11.5.1 (bundled with Node 24) required for OIDC trusted publishing

      - name: Validate tag matches package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG_VERSION="$(jq -r '.version' package.json)"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG != package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Determine npm dist-tag and release-candidate status
        id: dist-tag
        run: |
          VERSION="$(jq -r '.version' package.json)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          RELEASE_TAG=$(node ./scripts/npm-dist-tag.js "$VERSION")
          IS_RELEASE_CANDIDATE=$(node ./scripts/is-release-candidate.js "$VERSION")

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "IS_RELEASE_CANDIDATE=$IS_RELEASE_CANDIDATE" >> "$GITHUB_ENV"

      - name: Publish to npm
        if: env.IS_RELEASE_CANDIDATE != 'true'
        run: |
          npm publish --registry https://registry.npmjs.org \
            --tag "$RELEASE_TAG" \
            --ignore-scripts --provenance --access public

      - name: Skip publish for release candidate
        if: env.IS_RELEASE_CANDIDATE == 'true'
        run: echo "::notice::${VERSION} is a release candidate - not publishing to npm."

  # This job is separate from the deploy job so that the deploy job doesn't also
  # need push access. No approval gate necessary here - deploy already required
  # one.
  move-latest-tag:
    needs: [deploy]
    runs-on: ubuntu-x64
    if: needs.deploy.result == 'success' && needs.deploy.outputs.release_tag == 'latest'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@<SHA-CHECKSUM> # TODO: pin

      - name: Move the latest tag
        env:
          VERSION: ${{ needs.deploy.outputs.version }}
        run: |
          git tag -f latest "$VERSION"
          git push origin latest --force
