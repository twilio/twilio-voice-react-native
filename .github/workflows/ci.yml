name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
  id-token: write
env:
  ARTIFACTORY_URL: ${{ vars.ARTIFACTORY_URL }}

jobs:
  test:
    # Forks can't use the internal runner group; fall back to ubuntu-latest.
    runs-on: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && 'ubuntu-latest' || 'ubuntu-x64' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Artifactory OIDC Auth
        if: ${{ !github.event.pull_request.head.repo.fork }} # skip on forks
        uses: ./.github/actions/artifactory-oidc
        with:
          artifactory_url: ${{ vars.ARTIFACTORY_URL }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22.13"
          cache: yarn

      - run: yarn run check
