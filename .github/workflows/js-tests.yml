# JS unit tests, ported from the `unit-tests` job in .circleci/config.yml.
# Intentionally minimal for now: no Android/iOS e2e, no lint/typecheck,
# no package/docs/release jobs. Add those later as needed.
name: JS Tests

on:
  pull_request:
  push:
    branches:
      - main
      - task/gha-poc # TEMP: remove before merging

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest-large
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0
        with:
          node-version: 24.15.0
          # cache: yarn

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # src/constants.ts is generated and git-ignored, but the unit tests
      # import it, so it has to be built before jest runs.
      - name: Generate constants
        run: yarn run build:constants

      - name: Unit tests
        run: yarn run check:test --coverage --detectOpenHandles --maxWorkers=2
